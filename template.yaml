Transform: AWS::Serverless-2016-10-31
Resources:
  Pirates:
    Type: AWS::DynamoDB::Table
    Properties:
      AttributeDefinitions:
        - AttributeName: pirateId
          AttributeType: S
      BillingMode: PAY_PER_REQUEST
      KeySchema:
        - AttributeName: pirateId
          KeyType: HASH
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES

  GetPirateByIdFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      Description: !Sub
        - Stack ${AWS::StackName} Function ${ResourceName}
        - ResourceName: GetPirateByIdFunction
      CodeUri: .
      Handler: com.serverless.pirates.getbyid.Handler::handleRequest
      Runtime: java21
      MemorySize: 256
      Timeout: 30
      Tracing: Active
      Events:
        PiratesApiGETpiratespirateId:
          Type: Api
          Properties:
            Path: /pirates/{pirateId}
            Method: GET
            RestApiId: !Ref PiratesApi
      Environment:
        Variables:
          PIRATES_TABLE_NAME: !Ref Pirates
          PIRATES_TABLE_ARN: !GetAtt Pirates.Arn
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref Pirates

  GetPirateByIdFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      LogGroupName: !Sub /aws/lambda/${GetPirateByIdFunction}

  GetAllPiratesFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      Description: !Sub
        - Stack ${AWS::StackName} Function ${ResourceName}
        - ResourceName: GetAllPiratesFunction
      CodeUri: .
      Handler: com.serverless.pirates.getall.Handler::handleRequest
      Runtime: java21
      MemorySize: 256
      Timeout: 30
      Tracing: Active
      Environment:
        Variables:
          PIRATES_TABLE_NAME: !Ref Pirates
          PIRATES_TABLE_ARN: !GetAtt Pirates.Arn
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref Pirates
      Events:
        PiratesApiGETpirates:
          Type: Api
          Properties:
            Path: /pirates
            Method: GET
            RestApiId: !Ref PiratesApi
            Auth:
              Authorizer: NONE

  GetAllPiratesFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      LogGroupName: !Sub /aws/lambda/${GetAllPiratesFunction}

  SavePirateFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      Description: !Sub
        - Stack ${AWS::StackName} Function ${ResourceName}
        - ResourceName: SavePirateFunction
      CodeUri: .
      Handler: com.serverless.pirates.save.Handler::handleRequest
      Runtime: java21
      MemorySize: 256
      Timeout: 30
      Tracing: Active
      Events:
        PiratesApiPOSTpirates:
          Type: Api
          Properties:
            Path: /pirates
            Method: POST
            RestApiId: !Ref PiratesApi
      Environment:
        Variables:
          PIRATES_TABLE_NAME: !Ref Pirates
          PIRATES_TABLE_ARN: !GetAtt Pirates.Arn
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref Pirates

  SavePirateFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      LogGroupName: !Sub /aws/lambda/${SavePirateFunction}

  PiratesUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: pirates-user-pool
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireUppercase: true
          RequireNumbers: true
          RequireSymbols: false

  PiratesUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: pirates-client
      UserPoolId: !Ref PiratesUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      PreventUserExistenceErrors: ENABLED

  PiratesApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub
        - ${ResourceName} From Stack ${AWS::StackName}
        - ResourceName: PiratesApi
      StageName: Prod
      Auth:
        DefaultAuthorizer: CognitoAuthorizer
        Authorizers:
          CognitoAuthorizer:
            UserPoolArn: !GetAtt PiratesUserPool.Arn
      EndpointConfiguration: REGIONAL
      TracingEnabled: true
      Cors:
        MaxAge: 5

Outputs:
  PiratesUserPoolId:
    Description: Cognito User Pool ID for app auth config
    Value: !Ref PiratesUserPool

  PiratesUserPoolClientId:
    Description: Cognito App Client ID for app auth config
    Value: !Ref PiratesUserPoolClient

  PiratesApiUrl:
    Description: Base URL for the protected Pirates API
    Value: !Sub https://${PiratesApi}.execute-api.${AWS::Region}.amazonaws.com/Prod
